name: Update fuel prices

on:
  workflow_dispatch:
  schedule:
    - cron: "30 10 * * 4"

permissions:
  contents: write

jobs:
  update-fuel-prices:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: Update fuel-prices.json
        env:
          TURKEY_FUEL_API_URL: ${{ secrets.TURKEY_FUEL_API_URL }}
        run: python scripts/update-fuel-prices.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add fuel-prices.json
          if git diff --cached --quiet; then
            echo "No fuel price changes."
          else
            git commit -m "Spritpreise automatisch aktualisieren"
            git push
          fi
